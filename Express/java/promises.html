<body>
    <script>
        let promise= new Promise((resolve,reject)=>{
            let task=true;
            if(task){
                resolve("Task completed");
            }
            else{
                reject("Something went wrong ")
            }
        })
        promise
        .then((result)=>{console.log(result)})
        .catch((error)=>{console.log(error)})
    </script>
    
</body>

</html>
