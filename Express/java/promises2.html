<!DOCTYPE html>
<html lang="en">
<head>
    
</head>
<body>
    <script>
        let cookiePromise= new Promise((resolve,reject)=>{
            console.log("mom starts baking...");
            setTimeout(()=>{
                let success=Math.random() > 0.5;
                if(success){
                    resolve("cookies ready");
                }
                else{
                    reject("Oops! cookies failed");
                }
            },3000)
        })
            cookiePromise
        .then((result)=>{console.log(result)})
        .catch((error)=>{console.log(error)})

            
            
        
    </script>
    
</body>
</html>
