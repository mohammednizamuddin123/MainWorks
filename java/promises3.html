<!DOCTYPE html>
<html lang="en">
<head>
    
</head>
<body>
    <script>
        function putInBox(){
            return new Promise((resolve,reject)=>{
                setTimeout(()=>{
                    let giftput=Math.random() > 0.5
                    if(giftput){
                        resolve("Gift Put In Box")
                    }
                    else{
                        reject("Gift Put Failed")
                    }
                },3000)
            })
        }
        function wrapGift(){
            return new Promise((resolve,reject)=>{
                setTimeout(()=>{
                    console.log("Gift Wrapped");
                    resolve()
                },3000)
            })
        }
        function tieRibbon(){
            return new Promise((resolve,reject)=>{
                setTimeout(()=>{
                    console.log("Gift Tied");
                    resolve()
                },3000)
            })
        }
        function addTag(){
            return new Promise((resolve,reject)=>{
                setTimeout(()=>{
                    console.log("Gift tagged");
                    resolve()
                },3000)
            })
        }
        function giftReady(){
            return new Promise((resolve,reject)=>{
                setTimeout(()=>{
                    console.log("Gift Ready");
                    resolve()
                },3000)
            })
        }
        putInBox()
        .then((reult)=>{console.log(result);
            wrapGift()
        })
        .then(()=>{tieRibbon()})
        .then(()=>{addTag()})
        .then(()=>{giftReady()})
        .catch((error)=>{console.log(error)
        })

                    
                    
                    
    </script>
    
</body>
</html>
