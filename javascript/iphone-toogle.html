<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    .toogle-switch{
        position: relative;
        display:inline-block;
        width: 50px;
        height: 25px;
    }
    input{
        display:none;         
      }
    
    .slider{
        position: absolute;
        cursor: pointer;
        width: 100%;
        height: 100%;
        background-color: #bbb;
        border-radius: 12.5px;
    }
    .slider::before{
       content: "";
        position: absolute;
        width: 22px;
        height: 22px;
        background-color: white;
        border-radius: 50%;
        top: 1.5px;
        left: 1.5px;
        transition: .3s;

    }
    input:checked+.slider{
        background-color: green;

    }
    input:checked+.slider::before{
        left:26.5px;
        transition: .3s;
    }
  </style>
  <body>
    <label  class="toogle-switch">
      <input type="checkbox" name="" id=""  />
      <span class="slider"></span>
    </label>

   <script src="toogle.js"></script>
  </body>
</html>
